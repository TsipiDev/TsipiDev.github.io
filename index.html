<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Dimitris Vatousis</title>

    <!-- Add the favicon (website icon) -->
    <link rel="icon" href="your-icon-path.png" type="image/png"> <!-- Replace with your image path -->

    <!-- Internal CSS for styling -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fff; /* White background */
            color: #000; /* Black text */
            padding: 0;
            margin: 0;
            overflow-x: hidden; /* Ensure no horizontal scrolling */
        }

        /* Top navigation bar */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #000; /* Black navigation bar */
            padding: 10px 20px; /* Adjusted padding */
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            overflow-x: hidden;  /* Ensure no horizontal overflow */
        }

        /* Website Name */
        .site-title {
            font-size: 24px;
            color: white;
            margin-left: 30px;
        }

        /* Categories */
        .nav-links {
            display: flex;
            gap: 30px;
            margin-right: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: white; /* White text for links */
            font-size: 18px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #888;
        }

        /* Section styling */
        section {
            padding: 150px 50px 50px; /* Top padding for space */
            height: 100vh;
            display: none; /* Hide all sections by default */
            justify-content: center; /* Center content vertically */
            align-items: center; /* Center content horizontally */
            flex-direction: column; /* Ensure vertical stacking of the boxes */
        }

        section.active {
            display: flex; /* Show the active section */
        }

        /* Title Styling */
        h1 {
            margin-bottom: 100px; /* Space below each section title */
            font-size: 32px;
        }

        /* Content boxes are squares, centered in the body */
        .content-box {
            background-color: #f4f4f4; /* Light gray background */
            width: 300px; /* Fixed width to make a square */
            height: 300px; /* Fixed height */
            padding: 20px;
            margin-bottom: 100px; /* Space between boxes */
            border: 1px solid #000; /* Black border */
            border-radius: 8px;
            color: #000; /* Black text */
            display: flex;
            justify-content: center; /* Center the "Coming Soon" text */
            align-items: center;
            text-align: center;
            font-size: 24px;
        }

        /* Trademark Styling */
        .trademark {
            position: fixed;
            bottom: 10px;
            right: 20px;
            font-size: 12px;
            color: #888; /* Gray text for the trademark */
        }

        /* Media Queries for responsiveness */
        @media (max-width: 768px) {
            /* Adjust the navigation padding for tablets */
            nav {
                flex-direction: column;
                align-items: center;
                padding: 10px; /* Reduced padding */
            }

            /* Reduce site title size */
            .site-title {
                font-size: 20px;
                margin-left: 0;
            }

            /* Adjust the nav links for smaller screens */
            .nav-links {
                flex-direction: column;
                gap: 10px;
                margin-right: 0;
            }

            .nav-links a {
                font-size: 16px;
            }

            /* Make the section title smaller */
            h1 {
                font-size: 28px;
                margin-bottom: 50px;
            }

            /* Resize content boxes for smaller screens */
            .content-box {
                width: 250px; /* Smaller width */
                height: 250px; /* Smaller height */
                font-size: 20px;
                margin-bottom: 50px;
            }
        }

        @media (max-width: 480px) {
            /* Further adjustments for very small screens */
            nav {
                padding: 5px;  /* Minimized padding for very small screens */
                flex-direction: column;
                align-items: center;
            }

            .site-title {
                font-size: 18px;
            }

            .nav-links a {
                font-size: 14px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 40px;
            }

            /* Make the content boxes even smaller */
            .content-box {
                width: 200px;
                height: 200px;
                font-size: 18px;
                margin-bottom: 40px;
            }

            /* Trademark adjustment */
            .trademark {
                font-size: 10px;
            }
        }
    </style>
</head>
<body style="overflow-x: hidden;">

    <!-- Navigation -->
    <nav>
        <div class="site-title">Dimitris Vatousis</div>
        <div class="nav-links">
            <a href="#experience">Experience</a>
            <a href="#projects">Projects</a>
            <a href="#research">Research</a>
            <a href="#information">Information</a>
        </div>
    </nav>

    <!-- Experience Section -->
    <section id="experience" class="active">
        <h1>Experience</h1>
        <div class="content-box">
            Coming Soon !!
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects">
        <h1>Projects</h1>
        <div class="content-box">
            Coming Soon !!
        </div>
    </section>

    <!-- Research Section -->
    <section id="research">
        <h1>Research</h1>
        <div class="content-box">
            Coming Soon !!
        </div>
    </section>

    <!-- Information Section -->
    <section id="information">
        <h1>Information</h1>
        <div class="content-box">
            Coming Soon !!
        </div>
    </section>

    <!-- Trademark at the bottom right -->
    <div class="trademark">© Dimitris Vatousis</div>

    <!-- JavaScript for smooth section transitions -->
    <script>
        // Initially only the Experience section is visible
        document.querySelectorAll('section').forEach(section => {
            section.classList.remove('active');
        });
        document.getElementById('experience').classList.add('active'); // Default visible section

        // Smooth navigation between sections
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);

                // Hide all sections
                document.querySelectorAll('section').forEach(section => {
                    section.classList.remove('active');
                });

                // Show the clicked section
                document.getElementById(targetId).classList.add('active');
            });
        });
    </script>

</body>
</html>
